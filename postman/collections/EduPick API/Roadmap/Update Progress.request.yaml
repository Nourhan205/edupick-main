$kind: http-request
name: Update Progress
method: POST
url: '{{baseUrl}}/roadmap/progress'
order: 7000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{userEmail}}",
      "roadmap_id": "{{roadmapId}}",
      "roadmap": {
        "phases": []
      }
    }
