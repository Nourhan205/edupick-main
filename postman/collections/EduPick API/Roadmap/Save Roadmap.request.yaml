$kind: http-request
name: Save Roadmap
method: POST
url: '{{baseUrl}}/roadmap/save'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{userEmail}}",
      "roadmap": {
        "track": "Web Development",
        "level": "beginner",
        "goal": "Get a junior developer job",
        "phases": []
      }
    }
