$kind: http-request
name: Submit Career Quiz
method: POST
url: '{{baseUrl}}/quiz/submit'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{userEmail}}",
      "answers": {
        "q1": "A",
        "q2": "B",
        "q3": "C"
      }
    }
